<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bastidores · Eduardo Kozlowski</title>
  <meta name="description" content="Bastidores de Eduardo Kozlowski: DIT em set, equipamento, workflow e estação de trabalho." />
  <meta name="theme-color" content="#ffffff" />

  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.classList.add("js");
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>

  <link rel="icon" type="image/png" href="assets/ekoz-symbol.png" />
  <link rel="apple-touch-icon" href="assets/ekoz-symbol.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="progress" id="progress"></div>
  <div class="grain" aria-hidden="true"></div>

  <header class="nav" id="nav"></header>

  <main>
    <section class="section page-head">
      <div class="wrap">
        <p class="hero__eyebrow reveal">Bastidores</p>
        <h1 class="page-head__title reveal" style="--d:1">Bastidores<span class="hero__dot">.</span></h1>
        <p class="page-head__lead reveal" style="--d:2">
          DIT em set: equipamento, workflow e estação de trabalho.
        </p>
      </div>
    </section>

    <section class="section section--alt">
      <div class="wrap">
        <div id="gallery" class="gallery"></div>
      </div>
    </section>
  </main>

  <footer class="footer" id="site-footer"></footer>

  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox__close" aria-label="Fechar">&times;</button>
    <button class="lightbox__nav lightbox__nav--prev" aria-label="Foto anterior">&#8249;</button>
    <img class="lightbox__img" src="" alt="" />
    <button class="lightbox__nav lightbox__nav--next" aria-label="Próxima foto">&#8250;</button>
    <span class="lightbox__count"></span>
  </div>

  <script src="script.js"></script>
</body>
</html>
