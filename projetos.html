<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projetos · Eduardo Kozlowski</title>
  <meta name="description" content="Projetos em vídeo de Eduardo Kozlowski: trailers e registros de séries, longas e publicidade." />
  <meta name="theme-color" content="#ffffff" />

  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.classList.add("js");
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>

  <link rel="icon" type="image/png" href="assets/ekoz-symbol.png" />
  <link rel="apple-touch-icon" href="assets/ekoz-symbol.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="progress" id="progress"></div>
  <div class="grain" aria-hidden="true"></div>

  <header class="nav" id="nav"></header>

  <main>
    <section class="section page-head">
      <div class="wrap">
        <p class="hero__eyebrow reveal">Portfólio</p>
        <h1 class="page-head__title reveal" style="--d:1">Projetos<span class="hero__dot">.</span></h1>
        <p class="page-head__lead reveal" style="--d:2">
          Trailers e registros de séries, longas, publicidade e shows em que trabalhei.
        </p>
      </div>
    </section>

    <section class="section section--alt">
      <div class="wrap">
        <div id="videos" class="videos"></div>
      </div>
    </section>
  </main>

  <footer class="footer" id="site-footer"></footer>

  <script src="script.js"></script>
</body>
</html>
